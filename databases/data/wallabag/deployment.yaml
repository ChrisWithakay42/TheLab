apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: wallabag-db
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate # Crucial for RWO volumes on Raspberry Pi to prevent "Volume already attached" errors
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # Protect the DB from being killed
      priorityClassName: application-high
      containers:
        - name: postgres
          image: postgres:15
          # --- WALLABAG OPTIMIZATION ---
          # Wallabag is less write-heavy than n8n, so we can use a smaller cache.
          args:
            - "-c"
            - "shared_buffers=64MB"
            - "-c"
            - "max_connections=50"
            - "-c"
            - "work_mem=2MB"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"  
              cpu: "500m"      
          envFrom:
            - secretRef:
                name: wallabag-postgres-secret
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres
          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - "postgres"
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - "postgres"
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: wallabag-postgres-pvc
