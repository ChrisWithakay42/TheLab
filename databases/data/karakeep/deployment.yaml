apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: karakeep-db
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      priorityClassName: application-high
      containers:
        - name: postgres
          image: postgres:15
          args:
            - "-c"
            - "shared_buffers=128MB"
            - "-c"
            - "max_connections=100"
            - "-c"
            - "work_mem=4MB"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          envFrom:
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres
          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - "postgres"
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - "postgres"
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
