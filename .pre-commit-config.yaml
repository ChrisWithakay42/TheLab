repos:
- repo: local
  hooks:
    - id: sops-encryption-check
      name: Check Lab42 Overlays
      # Wrapped in " " and escaped internal " with \
      entry: "/bin/bash -c 'for f in \"$@\"; do grep -q \"sops\" \"$f\" || { echo \"ERROR: $f is NOT encrypted!\"; exit 1; }; done' --"
      language: system
      files: (^|/)lab42/.*\.yaml$
      exclude: ^cluster/lab42/
      pass_filenames: true
