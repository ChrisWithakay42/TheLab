repos:
- repo: local
  hooks:
    - id: sops-encryption-check
      name: Check Lab42 Overlays
      entry: |
        /bin/bash -c 'for f in "$@"; do grep -q "sops" "$f" || { echo "ERROR: $f is NOT encrypted!"; exit 1; }; done' --
      language: system
      # Select all .yaml files in lab42 directories
      files: .*/lab42/.*\.yaml$
      # Exclude any file named 'kustomization.yaml' or anything in 'cluster/lab42/'
      exclude: (kustomization\.yaml|^cluster/lab42/)
      pass_filenames: true
