apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: homepage
          image: "ghcr.io/gethomepage/homepage:latest"
          imagePullPolicy: Always
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "cwk.homepage,localhost,homepage.homepage.svc.cluster.local" 
            - name: HOMEPAGE_VAR_PIHOLE_WEBPASSWORD
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: PIHOLE_WEBPASSWORD
            - name: HOMEPAGE_VAR_PVE_USER
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: PVE_USER
            - name: HOMEPAGE_VAR_PVE_PASS
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: PVE_PASS
            - name: HOMEPAGE_VAR_OPNSENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: OPNSENSE_KEY
            - name: HOMEPAGE_VAR_OPNSENSE_SECRET
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: OPNSENSE_SECRET
            - name: HOMEPAGE_VAR_OMV_USER
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: OMV_USER
            - name: HOMEPAGE_VAR_OMV_PASS
              valueFrom:
                secretKeyRef:
                  name: homepage-secret
                  key: OMV_PASS
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /app/config
              name: homepage-config
            - mountPath: /app/config/logs
              name: logs
      volumes:
        - name: homepage-config
          configMap:
            name: homepage
        - name: logs
          emptyDir: {}
