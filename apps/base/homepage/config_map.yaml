apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    serviceDiscovery:
      ingress: false
    providers:
      longhorn:
        url: https://cwk.longhorn
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/
  services.yaml: |
    - Network & Core:
        - OPNSense:
            href: https://192.168.10.1
            description: Router/Firewall
            icon: opnsense.svg
        - Unifi:
            href: https://192.168.30.10:8443/
            description: Unifi Controller
            icon: unifi.svg
        - Pi-hole:
            href: http://192.168.30.5/admin/
            description: Ad-blocking DNS
            icon: pi-hole.svg
            widget:
              type: pihole
              url: https://192.168.30.5
              version: 6
              key: "{{HOMEPAGE_VAR_PIHOLE_WEBPASSWORD}}"

    - Compute & Storage:
        - Proxmox VE:
            href: http://192.168.20.30:8006/
            description: Virtualization Management
            icon: proxmox.png
        - OMV:
            href: http://192.168.10.111
            description: OpenMediaVault NAS
            icon: openmediavault.svg
        - MinIO:
            href: http://192.168.x.x:9001
            description: S3 Object Storage
            icon: minio.svg
            widget:
              type: minio
              url: http://192.168.x.x:9000
              key: "{{HOMEPAGE_VAR_MINIO_ACCESS_KEY}}"
              secret: "{{HOMEPAGE_VAR_MINIO_SECRET_KEY}}"
        - Longhorn:
            href: http://cwk.longhorn/
            description: Cluster Storage Management
            icon: longhorn.svg

    - Infrastructure Management:
        - Netbox:
            href: http://192.168.30.30
            description: IPAM/DCIM
            icon: netbox.png
        - pgAdmin:
            href: http://cwk.pgadmin/
            description: Database GUI
            icon: pgadmin.svg
        - Graylog:
            href: http://cwk.graylog/
            description: Log Management
            icon: graylog.svg
        - Grafana:
            href: http://cwk.grafana/
            description: Metrics Monitoring
            icon: grafana.svg

    - Apps & Automation:
        - n8n:
            href: http://cwk.n8n/
            description: Workflow Automation
            icon: n8n.svg
        - Wallabag:
            href: http://cwk.wallabag
            description: Read later application
            icon: wallabag.svg
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
        expanded: true
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
