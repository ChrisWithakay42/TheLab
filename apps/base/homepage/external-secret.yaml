apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-secret
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: homepage-secret
    creationPolicy: Owner
  data:
    - secretKey: PIHOLE_WEBPASSWORD
      remoteRef:
        key: homelab/kubernetes/homepage
        property: PIHOLE_WEBPASSWORD
    - secretKey: PVE_USER
      remoteRef:
        key: homelab/kubernetes/homepage
        property: PVE_USER
    - secretKey: PVE_PASS
      remoteRef:
        key: homelab/kubernetes/homepage
        property: PVE_PASS
    - secretKey: OPNSENSE_KEY
      remoteRef:
        key: homelab/kubernetes/homepage
        property: OPNSENSE_KEY
    - secretKey: OPNSENSE_SECRET
      remoteRef:
        key: homelab/kubernetes/homepage
        property: OPNSENSE_SECRET
    - secretKey: OMV_USER
      remoteRef:
        key: homelab/kubernetes/homepage
        property: OMV_USER
    - secretKey: OMV_PASS
      remoteRef:
        key: homelab/kubernetes/homepage
        property: OMV_PASS
