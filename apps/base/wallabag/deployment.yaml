apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: wallabag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
        try: "0"
        policy-type: "app"
    spec:
      initContainers:
        - name: wallabag-install
          image: ghcr.io/wallabag/docker:2.6.10
          command: ['/bin/sh', '-c', 'SYMFONY_ENV=prod bin/console wallabag:install --no-interaction']
          envFrom:
            - secretRef:
                name: wallabag-secret
          volumeMounts:
            - name: data
              mountPath: /var/www/wallabag/data
      containers:
        - name: wallabag
          image: ghcr.io/wallabag/docker:2.6.10
          securityContext:
            allowPrivilegeEscalation: false
          envFrom:
            - secretRef:
                name: wallabag-secret
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/www/wallabag/data
      restartPolicy: Always
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wallabag-pvc
