apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: wallabag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
        try: "0"
        policy-type: "app"
    spec:
      initContainers:
        - name: wallabag-install
          image: ghcr.io/wallabag/docker:2.6.10
          command: ['/bin/sh', '-c', 'bin/console wallabag:install --no-interaction || true']
          envFrom:
            - secretRef:
                name: wallabag-secret
      containers:
        - name: wallabag
          image: ghcr.io/wallabag/docker:2.6.10
          securityContext:
            allowPrivilegeEscalation: false
          envFrom:
            - secretRef:
                name: wallabag-secret
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
