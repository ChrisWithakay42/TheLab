apiVersion: v1
kind: Service
metadata:
  name: unifi-lb
  namespace: unifi
  labels:
    io.cilium/network: mgmt 
    app: unifi-controller 
  annotations:
    lbipam.cilium.io/ips: "192.168.30.10"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app: unifi
  ports:
    - name: web-ui
      port: 8443
      targetPort: 8443
      protocol: TCP
    - name: controller
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: stun
      port: 3478
      targetPort: 3478
      protocol: UDP
    - name: discovery
      port: 10001
      targetPort: 10001
      protocol: UDP
    - name: speedtest
      port: 6789
      targetPort: 6789
      protocol: TCP
    - name: l2-discover
      port: 1900
      targetPort: 1900
      protocol: UDP
