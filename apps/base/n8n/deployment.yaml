apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
        - name: n8n
          image: n8nio/n8n:1.113.3
          resources:
            requests:
              memory: "384Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"   
              cpu: "1000m"    
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_SECURE_COOKIE
              value: "false"
            # This tells Node.js to Garbage Collect at 768MB so it doesn't 
            # hit the 1GB K8s limit and get killed.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
          envFrom:
            - secretRef:
                name: n8n-secret
          ports:
            - containerPort: 5678
              name: http
