apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: karakeep-secret
  namespace: karakeep
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: karakeep-secret
    creationPolicy: Owner
    template:
      engine:
        apiVersion: v2
        kind: golang
      data:
        KK_DATABASE_URL: "postgres://{{ .user }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .database }}"
  dataFrom:
    - extract:
        key: homelab/kubernetes/karakeep
