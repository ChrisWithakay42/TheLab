apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  interval: 5m # Increased from 1m to reduce API pressure on RPi during boot
  retryInterval: 1m
  timeout: 10m # Increased to give Cilium/Longhorn time to pull images on a cold start
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/controllers/base
  prune: true
  wait: true # WARN: Flux will wait for Cilium to be 'Ready' before moving on.
             # This solves the "No CNI" deadlock for subsequent pods.
