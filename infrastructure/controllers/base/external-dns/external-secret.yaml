apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-dns-api-token
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: cloudflare-dns-api-token
  data:
    - secretKey: cloudflare-dns-api-token
      remoteRef:
        key: homelab/kubernetes/cloudflare
        property: api_token                 
