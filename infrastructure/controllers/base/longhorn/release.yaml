apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 15m
  chart:
    spec:
      chart: longhorn
      version: "1.6.2"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    priorityClass: infrastructure-critical
    defaultSettings:
      # Stop the boot-up crash by limiting how many volumes rebuild at once
      defaultReplicaCount: 2
      concurrentReplicaRebuildPerNodeLimit: 1 
      guaranteedEngineManagerCPU: 10
      guaranteedReplicaManagerCPU: 10
      replicaSoftAntiAffinity: true
      storageMinimalAvailablePercentage: 15
      backupTarget: "s3://HomeLab-Kubernetes-DBs@eu-central-003/longhorn/"
      backupTargetCredentialSecret: "longhorn-backup-target-secret"
      s3:
        endpoint: "https://s3.eu-central-003.backblazeb2.com"
