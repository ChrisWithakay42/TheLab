apiVersion: v1
kind: ConfigMap
metadata:
  name: cilium-config
  namespace: kube-system
data:
  values.yaml: |
    # --- RPi5 API Connectivity ---
    k8sServiceHost: "192.168.40.10"
    k8sServicePort: 6443
    kubeProxyReplacement: true

    # --- IP Address Management ---
    ipam:
      mode: kubernetes

    # --- BGP & L2 ---
    bgpControlPlane:
      enabled: true
    operator:
      enableBGPControlPlane: true
    l2announcements:
      enabled: true
    externalIPs:
      enabled: true
    loadBalancer:
      algorithm: maglev

    # --- Ingress & Hubble ---
    ingressController:
      enabled: true
      default: true
      loadBalancerMode: shared
    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
      metrics:
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - http
    
    # --- Memory Management for Pi ---
    bpf:
      preallocateMaps: false
      mapDynamicSizeRatio: 0.0025
