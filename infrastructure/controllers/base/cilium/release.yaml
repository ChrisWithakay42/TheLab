apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  releaseName: cilium
  targetNamespace: kube-system
  interval: 1h
  chart:
    spec:
      chart: cilium
      version: "1.19.1"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: cilium-config
      optional: false
  values:
    # --- RPi5 API Connectivity (Crucial for Bootstrap) ---
    k8sServiceHost: "192.168.40.10" 
    k8sServicePort: 6443
    
    # --- Structural Defaults ---
    cluster:
      name: homelab
      id: 1
    identityAllocationMode: crd
    routingMode: tunnel
    tunnelProtocol: vxlan
    ipv4NativeRoutingCIDR: "10.244.0.0/16"
    
    operator:
      replicas: 1
      removeNodeTaints: true
      setNodeTaints: false
