apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: cilium
      version: 1.18.1
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    cluster:
      name: homelab
      id: 1
    k8sServiceHost: 192.168.40.10  # Or the actual LAN IP 
    k8sServicePort: 6443

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  releaseName: cilium
  targetNamespace: kube-system
  interval: 1h
  chart:
    spec:
      chart: cilium
      version: "1.18.1"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    remediation:
      retries: 3
  # This tells Flux to look for a ConfigMap named 'cilium-config' 
  # and merge those values over these defaults.
  valuesFrom:
    - kind: ConfigMap
      name: cilium-config
      optional: false
  values:
    # --- Structural Defaults ---
    identityAllocationMode: crd
    routingMode: tunnel
    tunnelProtocol: vxlan
    ipv4NativeRoutingCIDR: "10.244.0.0/16"
    
    operator:
      replicas: 1
      removeNodeTaints: true
      setNodeTaints: false
