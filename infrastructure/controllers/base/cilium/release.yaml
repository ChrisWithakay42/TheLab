apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: cilium
      version: 1.18.1
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    cluster:
      name: homelab
      id: 1
    k8sServiceHost: 192.168.40.10  # Or the actual LAN IP 
    k8sServicePort: 6443

    operator:
      replicas: 1
      removeNodeTaints: true
      setNodeTaints: false

    # --- RPi5 / LAB STABILITY ---
    kubeProxyReplacement: true
    ipam:
      mode: kubernetes
    
    # --- BGP & L2 ANNOUNCEMENTS ---
    bgpControlPlane:
      enabled: true
    
    l2announcements:
      enabled: true
    
    externalIPs:
      enabled: true

    loadBalancer:
      algorithm: maglev

    # --- INGRESS & HUBBLE ---
    ingressController:
      enabled: true
      service:
        type: LoadBalancer
        loadBalancerMode: shared
    
    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
      metrics:
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - http

    # --- MONITORING ---
    # Helps Prometheus find Cilium
    # prometheus:
    #   enabled: true
    #   serviceMonitor:
    #     enabled: true

    # --- NODE STABILITY ---
    # tolerations:
    # - key: "node.kubernetes.io/not-ready"
    #   operator: "Exists"
    #   effect: "NoExecute"
    # - key: "node.kubernetes.io/not-ready"
    #   operator: "Exists"
    #   effect: "NoSchedule"
