apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel-credentials
  namespace: networking
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: cloudflare-tunnel-credentials
    template:
      engineVersion: v2
      data:
        credentials.json: "{{ .tunnel_json }}"
  data:
    - secretKey: tunnel_json
      remoteRef:
        key: homelab/kubernetes/cloudflare  # Same AWS secret
        property: tunnel_json               # The key where you pasted the Tunnel JSON string
