---
# 1. Technical settings (Timers)
apiVersion: "cilium.io/v2"
kind: CiliumBGPPeerConfig
metadata:
  name: opnsense-peer-config
spec:
  timers:
    holdTimeSeconds: 90
    keepAliveTimeSeconds: 30
  families:
    - afi: ipv4
      safi: unicast

---
# 2. Cluster Config (Matches your Pi Nodes)
apiVersion: "cilium.io/v2"
kind: CiliumBGPClusterConfig
metadata:
  name: opnsense-peering
spec:
  nodeSelector:
    matchExpressions:
      - {key: kubernetes.io/hostname, operator: Exists}
  bgpInstances:
    - name: "vlan-40-instance"
      localASN: 64513
      peers:
        - name: "opnsense-router"
          peerAddress: "192.168.40.1"
          peerASN: 64512
          peerConfigRef:
            name: "opnsense-peer-config"

---
# 3. Global Advertisement (No complex selectors)
apiVersion: "cilium.io/v2"
kind: CiliumBGPAdvertisement
metadata:
  name: unifi-ad
spec:
  advertisements:
    - advertisementType: "Service"
      service:
        addresses:
          - LoadBalancerIP
      selector:
        matchLabels:
          # This matches your existing Service label
          io.cilium/network: mgmt
