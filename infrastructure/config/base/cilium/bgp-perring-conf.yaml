---
# 1. The BGP Cluster Configuration (The Handshake)
apiVersion: "cilium.io/v2"
kind: CiliumBGPClusterConfig
metadata:
  name: opnsense-peering
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux # Applies to all your Pi nodes
  bgpInstances:
    - name: "vlan-40-peering"
      localASN: 64513
      peers:
        - name: "opnsense-router"
          peerAddress: "192.168.40.1" # Your OPNsense IP on VLAN 40
          peerASN: 64512

---
# 2. The Advertisement (The Route Injection)
apiVersion: "cilium.io/v2"
kind: CiliumBGPAdvertisement
metadata:
  name: unifi-ad
spec:
  advertisementType: "Service"
  service:
    addresses:
      - LoadBalancerIP
  selector:
    matchLabels:
      app: unifi-controller # Matches the Service label
