# # Cilium Helm values translated from CLI flags
#
# # Use eBPF to replace kube-proxy
# kubeProxyReplacement: "true"
#
# l2announcements:
#   enabled: true
#
# externalIPs:
#   enabled: true
#
# hubble:
#   relay:
#     enabled: true
#   ui:
#     enabled: true
#
# loadBalancer:
#   algorithm: "maglev"
#
# ipam:
#   mode: "kubernetes"
#
# # Enable the Cilium Ingress Controller
# ingressController:
#   enabled: true
#   service:
#     type: "LoadBalancer"
#     loadBalancerMode: "shared"
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  releaseName: cilium
  targetNamespace: kube-system
  interval: 1h
  chart:
    spec:
      chart: cilium
      version: "1.18.1" 
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  values:
    # --- RPi5 / NO KUBE-PROXY SETTINGS ---
    k8sServiceHost: "192.168.40.10" 
    k8sServicePort: 6443
    kubeProxyReplacement: true

    # --- DATAPATH / ROUTING ---
    routingMode: tunnel
    tunnelProtocol: vxlan
    ipv4NativeRoutingCIDR: "10.244.0.0/16" 
    autoDirectNodeRoutes: false 

    # --- BGP & L2 ANNOUNCEMENTS ---
    bgpControlPlane:
      enabled: true
    l2announcements:
      enabled: true
    externalIPs:
      enabled: true

    # --- INGRESS & L7 ---
    ingressController:
      enabled: true
      loadbalancerMode: shared
    envoy:
      enabled: true
    loadBalancer:
      l7:
        backend: envoy

    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
      tls:
        auto:
          method: helm

    operator:
      replicas: 1 # Only 1 operator to save RAM
      resources:
        limits:
          memory: 256Mi
    bpf:
      preallocateMaps: false 
      mapDynamicSizeRatio: 0.0025 
    
    # Matching your current identity allocation
    identityAllocationMode: crd
